apiVersion: v1
kind: Service
metadata:
 name: mongodb
 namespace: roboshop
 labels:
  project: roboshop
  tier: db
  component: mongodb
spec:
 type: {{ .Values.service.type }}
 selector:
  project: roboshop
  tier: db
  component: mongodb
 ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017