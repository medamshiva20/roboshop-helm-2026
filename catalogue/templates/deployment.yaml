apiVersion: apps/v1
kind: Deployment
metadata:
 name: catalogue
 namespace: roboshop
 labels:
  project: roboshopp
  tier: backend
  component: catalogue
spec:
 replicas: {{ .Values.deployment.replicas }}
 selector:
  matchLabels:
   project: roboshop
   tier: backend
   component: catalogue
 templates:
  metadata:
   labels:
    project: roboshop
    tier: backend
    component: catalogue
  spec:
   containers:
    - name: catalogue 
      image: "{{ .Values.deployment.imageName}}:{{ .Values.deployment.imageVersion}}"
      imagePullPolicy: Always
      resources:
       requests:
        cpu: "100m"
        memory: "64Mi"
       limits:
        cpu: "200m"
        memory: "128Mi"
      startupProbe:
       httpGet:
        port: 8080
        path: /health
       failureThreshold: 2
       periodSeconds: 10
      readinessProbe:
       tcpSocket:
        port: 8080
       failureThreshold: 2
       periodSeconds: 10
       initialDelaySconds: 15
      livenessProbe:
       httpGet:
        port: 8080
        path: /health
       failureThreshold: 2
       periodSeconds: 10
      envFrom:
       - configMapRef:
          name: catalogue